version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    # We use short top-level directories (badrequest/, serviceinfo/) instead
    # of the full Java-style package path (io/altessa/badrequest/v1/). The
    # generated Java/PHP/etc. packages still use io.altessa.<name>.v1 via
    # explicit options.
    - PACKAGE_DIRECTORY_MATCH
    # google.protobuf.Empty is an acceptable request type for parameterless
    # RPCs; consumers don't need to instantiate a wrapper.
    - RPC_REQUEST_STANDARD_NAME
    # Returning the bare domain type instead of a wrapper response is
    # often preferable for simple read RPCs.
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
