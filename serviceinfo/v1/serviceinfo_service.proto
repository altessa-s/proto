syntax = "proto3";
package io.altessa.serviceinfo.v1;

option java_package = "io.altessa.serviceinfo.v1";
option java_multiple_files = true;

option go_package = "github.com/altessa-s/proto-gen-go/serviceinfo/v1;serviceinfov1";

import "google/protobuf/empty.proto";
import "serviceinfo/v1/serviceinfo.proto";

// Provides runtime information about the service instance.
service ServiceInfoService {
  // Retrieves service metadata including version and build information.
  rpc Get(google.protobuf.Empty) returns (ServiceInfo);
}
