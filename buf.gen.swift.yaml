version: v2
# protoc-gen-swift 1.30 ignores `include_imports: true` and does not
# emit Swift for transitively imported modules, even when buf passes
# them. The googleapis files we need (google/api/field_behavior and
# google/type/{color,date,money,phone_number}) are vendored under
# third_party/ and registered as a second buf module in buf.yaml, so
# they appear as primary inputs in the workspace image and Swift is
# emitted for them alongside our schemas. Apple's swift-protobuf
# bundles google.protobuf.* well-knowns; google.type.* and
# google.api.field_behavior have no canonical SwiftPM package —
# hence the vendor.
inputs:
  - directory: .
plugins:
  # Message types only. The grpc-swift service-stub plugin
  # (protoc-gen-grpc-swift) is intentionally NOT wired here while the
  # Swift gRPC ecosystem transitions from v1 to v2 (see
  # https://github.com/grpc/grpc-swift-2 and grpc-swift-protobuf).
  - local: protoc-gen-swift
    out: gen/swift
    opt:
      - Visibility=Public
      - FileNaming=FullPath
