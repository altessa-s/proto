name: Sync googleapis

# Refresh the vendored google/api + google/type protos under
# third_party/ against github.com/googleapis/googleapis once a week,
# and open a PR if anything has drifted. Rationale and refresh
# procedure: README.md "Vendored googleapis".

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    name: Sync vendored googleapis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PROTO_BOT_APP_ID }}
          private-key: ${{ secrets.PROTO_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.69.0
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch upstream googleapis files
        id: sync
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: .github/scripts/sync-googleapis.sh

      - name: Validate (buf lint)
        if: steps.sync.outputs.changed == 'true'
        # third_party/ is already excluded from lint in buf.yaml, so
        # this should be a no-op safety net. continue-on-error so
        # upstream-introduced nits never swallow the PR — the proto-check
        # status on the PR is the real gate.
        continue-on-error: true
        run: buf lint

      - uses: peter-evans/create-pull-request@v6
        if: steps.sync.outputs.changed == 'true'
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: chore/sync-googleapis
          base: develop
          commit-message: |
            chore: sync vendored googleapis to ${{ steps.sync.outputs.sha }}
          title: "chore: sync vendored googleapis to ${{ steps.sync.outputs.sha }}"
          body: |
            Upstream `googleapis/googleapis@${{ steps.sync.outputs.sha }}`
            differs from the vendored copies under `third_party/google/`.

            **Changed files:**
            ```
            ${{ steps.sync.outputs.changed_files }}
            ```

            Compare with previous: https://github.com/googleapis/googleapis/commits/master

            Auto-generated by `.github/workflows/sync-googleapis.yml`.
          labels: dependencies, automated
          delete-branch: true
