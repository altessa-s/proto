name: Proto Check

# Runs buf lint and buf breaking on every PR touching schema files.
# Used as a required status check before merging.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "**/*.proto"
      - "buf.yaml"
      - "buf.lock"
      - "buf.gen.*.yaml"
      - ".github/workflows/proto-check.yml"

permissions:
  contents: read

env:
  # Opt into Node.js 24 for JS-based actions (default starting 2026-06-02).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-breaking:
    name: Lint + Breaking-change check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.69.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
          buf_user: ${{ secrets.BUF_USER }}
          buf_api_token: ${{ secrets.BUF_TOKEN }}

      - name: buf lint
        run: buf lint

      - name: buf breaking against BSR
        # Compares the PR head against the latest published label on BSR
        # rather than the PR base branch, so breaking changes are caught
        # against what consumers actually depend on. The label used
        # mirrors the base branch: PRs into main check against the `main`
        # label, PRs into develop check against `develop`.
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          buf breaking --against "buf.build/altessa-s/proto:${BASE_REF}"
